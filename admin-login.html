<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalCare+ | Admin Portal</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --bg1: #1e293b;
            --bg2: #0f172a;
            --card: #ffffff;
            --muted: #6b7280;
            --text-dark: #0f172a;
            --line: #e5e7eb;
            --primary: #3b82f6;
            --primary2: #2563eb;
            --danger: #ef4444;
            --radius-auth: 18px;
            --shadow-auth: 0 18px 60px rgba(0, 0, 0, .25);
        }

        .auth-page-section {
            padding: 80px 24px;
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Abstract professional background bubbles */
        .auth-page-section::before,
        .auth-page-section::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.1);
            filter: blur(60px);
            z-index: 0;
        }

        .auth-page-section::before {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
        }

        .auth-page-section::after {
            width: 500px;
            height: 500px;
            bottom: -150px;
            left: -150px;
        }

        .shell-auth {
            width: min(480px, 100%);
            display: block;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .card-auth {
            background: var(--card);
            border-radius: var(--radius-auth);
            box-shadow: var(--shadow-auth);
            overflow: hidden;
        }

        .cardHead-auth {
            padding: 30px 30px 20px;
            border-bottom: 1px solid var(--line);
            text-align: center;
        }

        .admin-logo-badge {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: #eef2ff;
            display: grid;
            place-items: center;
            font-size: 24px;
            color: var(--primary2);
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, .15);
        }

        .cardBody-auth {
            padding: 30px;
        }

        .title-auth {
            margin: 0 0 8px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
        }

        .subtitle-auth {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }

        label.auth-label {
            display: block;
            font-size: 13px;
            color: #334155;
            margin: 0 0 6px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-auth {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            outline: none;
            transition: .2s ease;
            background: #f8fafc;
            color: #333;
        }

        .input-auth:focus {
            background: #fff;
            border-color: #9cc0ff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
        }

        .btn-auth {
            width: 100%;
            border: 0;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s ease;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-auth.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: #fff;
            box-shadow: 0 10px 20px rgba(37, 99, 235, .2);
        }

        .btn-auth.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, .3);
        }

        .btn-auth.primary:active {
            transform: translateY(0);
        }

        .msg-auth {
            margin-top: 16px;
            font-size: 13px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-auth.err {
            display: block;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .msg-auth.ok {
            display: block;
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 24px;
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link:hover {
            color: var(--primary2);
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="auth-page-section">
        <div class="shell-auth">
            <section class="card-auth">
                <div class="cardHead-auth">
                    <div class="admin-logo-badge"><i class="fas fa-shield-alt"></i></div>
                    <div class="title-auth">Admin Portal</div>
                    <div class="subtitle-auth">Secure access for system administrators only.</div>
                </div>

                <div class="cardBody-auth">
                    <form id="adminLoginForm">
                        <div class="input-group">
                            <label class="auth-label" for="adminEmail">Admin Email</label>
                            <input class="input-auth" id="adminEmail" type="email" placeholder="admin@dentalcare.com" required />
                        </div>

                        <div class="input-group">
                            <label class="auth-label" for="adminPassword">Password</label>
                            <input class="input-auth" id="adminPassword" type="password" placeholder="••••••••" required />
                        </div>

                        <button class="btn-auth primary" type="submit" id="loginBtn">Secure Login</button>

                        <div id="loginMsg" class="msg-auth"></div>
                    </form>

                    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Main Website</a>
                </div>
            </section>
        </div>
    </div>

    <!-- Firebase SDKs (Modular) -->
    <script type="module">
        import { auth, db } from './js/firebaseConfig.js';
        import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const loginForm = document.getElementById('adminLoginForm');
        const loginBtn = document.getElementById('loginBtn');
        const msgEl = document.getElementById('loginMsg');

        function setMsg(type, text) {
            msgEl.className = 'msg-auth ' + type;
            msgEl.textContent = text;
            msgEl.style.display = 'block';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            const urlParams = new URLSearchParams(window.location.search);
            const isTest = urlParams.get('testMode') === 'true';

            msgEl.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            if (isTest) {
                setTimeout(() => {
                    if (email === 'admin@dentalcare.com' && password === 'password123') {
                        setMsg('ok', 'Authentication successful. Redirecting...');
                        loginBtn.innerHTML = '<i class="fas fa-check"></i> Redirecting...';
                        setTimeout(() => {
                            window.location.href = 'admin-dashboard.html?testMode=true';
                        }, 1000);
                    } else {
                        setMsg('err', "Unauthorized access. This portal is for administrators only.");
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Secure Login';
                    }
                }, 500);
                return;
            }

            try {
                // 1. Authenticate with Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Fetch User Profile from Firestore to verify "admin" role
                const docRef = doc(db, 'users', user.uid);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists() || docSnap.data().role !== 'admin') {
                    // Not an admin, sign them out immediately
                    await signOut(auth);
                    throw new Error("Unauthorized access. This portal is for administrators only.");
                }

                // 3. Valid Admin: Save to local storage and redirect
                const userData = docSnap.data();
                localStorage.setItem('dentCareUser', JSON.stringify({
                    uid: user.uid,
                    email: email,
                    role: 'admin',
                    name: userData.name || "Administrator"
                }));

                setMsg('ok', 'Authentication successful. Redirecting...');
                loginBtn.innerHTML = '<i class="fas fa-check"></i> Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1000);

            } catch (error) {
                console.error("Admin Login Error:", error);
                
                let errorText = error.message;
                // Prettify common Firebase auth errors
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    errorText = "Invalid email or password.";
                } else if (error.code === 'auth/too-many-requests') {
                    errorText = "Too many failed attempts. Please try again later.";
                }

                setMsg('err', errorText);
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Secure Login';
            }
        });
    </script>
</body>
</html>
