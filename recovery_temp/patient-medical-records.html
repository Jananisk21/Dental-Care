<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Records - DentalCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="index.html" class="logo"><i class="fas fa-tooth"></i> DentalCare<sup>+</sup></a>
            <ul class="sidebar-menu">
                <li><a href="dashboard-patient.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="appointment.html"><i class="fas fa-plus-circle"></i> Book Appointment</a></li>
                <li><a href="patient-appointments.html"><i class="fas fa-calendar-alt"></i> My Appointments</a></li>
                <li><a href="#" class="active"><i class="fas fa-file-medical"></i> Medical Records</a></li>
                <li><a href="#"><i class="fas fa-credit-card"></i> Payments</a></li>
                <li><a href="#" onclick="window.Auth.logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i>
                        Logout</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="dashboard-header">
                <h2>Medical Records</h2>
                <button class="btn btn-primary" onclick="document.getElementById('uploadInput').click()">
                    <i class="fas fa-upload"></i> Upload New
                </button>
                <input type="file" id="uploadInput" hidden onchange="alert('File Uploaded Successfully!')">
            </header>

            <div class="recent-activity">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>File Name</th>
                            <th>Type</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><i class="fas fa-file-pdf" style="color:red; margin-right:10px;"></i>
                                Dental_XRay_2025.pdf</td>
                            <td>X-Ray</td>
                            <td>Oct 12, 2025</td>
                            <td><button class="btn-sm"><i class="fas fa-download"></i></button></td>
                        </tr>
                        <tr>
                            <td><i class="fas fa-file-image" style="color:blue; margin-right:10px;"></i>
                                Prescription_Dec.jpg</td>
                            <td>Prescription</td>
                            <td>Dec 05, 2025</td>
                            <td><button class="btn-sm"><i class="fas fa-download"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
