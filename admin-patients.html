<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Patients - DentalCare+</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-dashboard.css">
</head>

<body>

    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-logo"><i class="fas fa-tooth"></i> <span>DentalCare<sup>+</sup></span></div>
            <ul class="sidebar-menu">
                <li class="menu-item"><a href="admin-dashboard.html" class="menu-link"><i class="fas fa-th-large"></i>
                        <span>Dashboard</span></a></li>
                <li class="menu-item"><a href="admin-doctors.html" class="menu-link"><i class="fas fa-user-md"></i>
                        <span>Doctors</span></a></li>
                <li class="menu-item"><a href="admin-patients.html" class="menu-link active"><i
                            class="fas fa-users"></i> <span>Patients</span></a></li>
                <li class="menu-item"><a href="admin-appointments.html" class="menu-link"><i
                            class="fas fa-calendar-alt"></i> <span>Appointments</span></a></li>
                <li class="menu-item"><a href="admin-earnings.html" class="menu-link"><i class="fas fa-wallet"></i>
                        <span>Earnings</span></a></li>
                <li class="menu-item"><a href="admin-consultations.html" class="menu-link"><i
                            class="fas fa-laptop-medical"></i> <span>Online Consultations</span></a></li>
                <li class="menu-item"><a href="admin-emergency.html" class="menu-link"><i
                            class="fas fa-exclamation-circle"></i> <span>Emergency Cases</span></a></li>
                <li class="menu-item"><a href="admin-settings.html" class="menu-link"><i class="fas fa-cog"></i>
                        <span>Settings</span></a></li>
            </ul>
            <div class="sidebar-bottom"><a href="#" class="menu-link logout-trigger" style="color: #ff4757;"><i
                        class="fas fa-sign-out-alt"></i> <span>Logout</span></a></div>
        </aside>

        <div class="main-content">
            <nav class="top-navbar">
                <div class="page-title">
                    <h2>Patients Management</h2>
                </div>
                <div class="nav-actions">
                    <div class="profile-container" id="profileDropdownTrigger">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=007bff&color=fff"
                            class="profile-img" id="navProfilePic">
                        <i class="fas fa-chevron-down" style="font-size: 0.8rem;"></i>
                        <div class="dropdown-menu" id="navDropdown">
                            <a href="admin-clinic-info.html" class="dropdown-item"><i class="fas fa-clinic-medical"></i>
                                Clinic Info</a>
                            <a href="admin-settings.html" class="dropdown-item"><i class="fas fa-cog"></i> Settings</a>
                            <hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;">
                            <a href="#" class="dropdown-item logout-trigger" style="color: #ff4757;"><i
                                    class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </nav>

            <main class="dashboard-area">
                <div class="card">
                    <div class="table-header">
                        <h3>Registered Patients</h3>
                        <div class="search-bar">
                            <i class="fas fa-search"></i>
                            <input type="text" id="patientSearch" placeholder="Search Patient Name...">
                        </div>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="appointments-table">
                            <thead>
                                <tr>
                                    <th>Patient Name</th>
                                    <th>Joined Date</th>
                                    <th>Contact</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="patientsList"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Patient Records Modal -->
    <div id="recordsModal" class="modal">
        <div class="modal-content" style="width: 700px;">
            <div class="modal-header">
                <h3>Patient Medical History</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div id="patientRecordsView">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>

    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            color: #333;
        }

        .close-modal {
            cursor: pointer;
            font-size: 1.5rem;
            color: #888;
        }

        .records-body {
            padding: 30px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #ddd;
        }

        .record-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #007bff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-blue {
            background: #007bff;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Dropdown Style */
        .profile-container {
            position: relative;
            cursor: pointer;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background: white;
            min-width: 180px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 10px 0;
            z-index: 1100;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            display: block;
            padding: 10px 20px;
            color: #333;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .dropdown-item:hover {
            background: #f8fafc;
            color: #007bff;
        }

        .dropdown-item i {
            margin-right: 10px;
            width: 20px;
            color: #888;
        }
    </style>

    <script type="module">
        import { auth, db } from './js/firebaseConfig.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, onSnapshot, getDocs, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let doctorMap = {};

        async function loadDoctorMap() {
            try {
                const q = query(collection(db, "users"), where("role", "==", "doctor"));
                const snap = await getDocs(q);
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const emailPrefix = data.email ? data.email.split('@')[0] : '';
                    const fullName = data.name || data.displayName || emailPrefix || 'Unknown Doctor';
                    doctorMap[docSnap.id] = fullName;
                    if (data.name) doctorMap[data.name] = fullName;
                    if (emailPrefix) doctorMap[emailPrefix] = fullName;
                });
            } catch (err) {
                console.error("Error fetching doctor map:", err);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'login.html';
            else {
                initPage();
                // Profile Dropdown logic
                const trigger = document.getElementById('profileDropdownTrigger');
                const menu = document.getElementById('navDropdown');
                trigger.onclick = (e) => {
                    e.stopPropagation();
                    menu.classList.toggle('show');
                };
                window.onclick = () => menu.classList.remove('show');
            }
        });

        async function initPage() {
            await loadDoctorMap();
            loadPatients();
        }

        function loadPatients() {
            const q = query(collection(db, "users"), where("role", "==", "patient"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('patientsList');
                list.innerHTML = '';
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const pId = docSnap.id;
                    const name = data.name || "Unknown Patient";

                    list.innerHTML += `
                        <tr>
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=eef2ff&color=4338ca" style="width: 35px; height: 35px; border-radius: 50%;">
                                    <strong>${name}</strong>
                                </div>
                            </td>
                            <td>${data.createdAt ? new Date(data.createdAt).toLocaleDateString() : '---'}</td>
                            <td>${data.email}</td>
                            <td><button class="btn-blue" onclick="viewPatientRecords('${pId}', '${encodeURIComponent(name)}')">View Records</button></td>
                        </tr>
                    `;
                });
            });
        }

        window.viewPatientRecords = async (pId, name) => {
            const modal = document.getElementById('recordsModal');
            const view = document.getElementById('patientRecordsView');
            modal.style.display = 'block';
            name = decodeURIComponent(name);
            view.innerHTML = '<div style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> Loading Records...</div>';

            try {
                // Fetch medical_records for this patient
                const q = query(collection(db, "medical_records"), where("patientId", "==", pId));
                const snap = await getDocs(q);

                let content = `<div class="records-body"><h4>History for ${name}</h4><hr style="margin: 15px 0; border:0; border-top:1px solid #eee;">`;

                if (snap.empty) {
                    content += `
                        <div class="empty-state">
                            <i class="fas fa-folder-open"></i>
                            <p>No medical records uploaded</p>
                        </div>
                    `;
                } else {
                    snap.forEach(doc => {
                        const rec = doc.data();
                        const date = rec.createdAt ? new Date(rec.createdAt.seconds * 1000).toLocaleDateString() : '---';
                        content += `
                            <div class="record-card">
                                <div>
                                    <h5 style="margin: 0 0 5px 0;">${rec.category || 'General Document'}</h5>
                                    <p style="margin: 0; font-size: 0.8rem; color: #666;">${rec.fileName} • ${date}</p>
                                </div>
                                <button class="btn-sm btn-light" onclick="window.open('${rec.fileUrl}', '_blank')">View</button>
                            </div>
                        `;
                    });
                }

                // Add Consultation History (Appointments)
                const appQ = query(collection(db, "appointments"), where("userId", "==", pId), orderBy("createdAt", "desc"));
                const appSnap = await getDocs(appQ);

                content += `<h4 style="margin-top: 30px;">Consultation History</h4><hr style="margin: 15px 0; border:0; border-top:1px solid #eee;">`;

                if (appSnap.empty) {
                    content += `<p style="text-align: center; color: #888;">No consultation history found.</p>`;
                } else {
                    appSnap.forEach(aDoc => {
                        const app = aDoc.data();
                        let rawDoctor = (app.doctor || 'Dr. Not Assigned').trim();
                        let docDisplay = doctorMap[rawDoctor] || rawDoctor;
                        if (docDisplay !== 'Dr. Not Assigned') {
                            if (!/^(Dr\.\s*|Dr\s*)/i.test(docDisplay)) {
                                docDisplay = "Dr. " + docDisplay;
                            } else {
                                docDisplay = docDisplay.replace(/^(Dr\.\s*|Dr\s*)/i, "Dr. ");
                            }
                        }

                        content += `
                            <div style="padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between;">
                                <div>
                                    <p style="margin: 0; font-weight: 600;">${docDisplay}</p>
                                    <p style="margin: 0; font-size: 0.8rem; color: #666;">${app.date} at ${app.time}</p>
                                </div>
                                <span class="status-badge status-${app.status.toLowerCase()}">${app.status}</span>
                            </div>
                        `;
                    });
                }

                content += `</div>`;
                view.innerHTML = content;
            } catch (err) {
                console.error(err);
                view.innerHTML = '<p style="color: red; padding: 20px;">Error loading patient history.</p>';
            }
        };

        document.querySelector('.close-modal').onclick = () => {
            document.getElementById('recordsModal').style.display = 'none';
        };

        document.getElementById('patientSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#patientsList tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        });

        document.querySelectorAll('.logout-trigger').forEach(el => el.onclick = () => signOut(auth));
    </script>
</body>

</html>
