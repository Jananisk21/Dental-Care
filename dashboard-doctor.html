<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - DentalCare+</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-page {
            padding: 60px 0;
            background: #f4f7f6;
            min-height: calc(100vh - 400px);
        }

        .dashboard-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .appointment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .appointment-item:last-child {
            border-bottom: none;
        }

        .appointment-item:hover {
            background: #fafafa;
        }

        .patient-info h4 {
            color: #007bff;
            margin-bottom: 5px;
        }

        .patient-info p {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .status-tag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <i class="fas fa-tooth"></i> <span>DentalCare<sup>+</sup></span> <span
                    style="font-size: 0.6em; color: #6c757d;">(Doctor)</span>
            </a>
            <ul class="nav-menu">
                <li><a href="#" id="logoutBtn" style="color: #dc3545;">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-page">
        <div class="container">
            <div class="dashboard-card">
                <h2><i class="fas fa-user-md"></i> My Scheduled Appointments</h2>
                <hr style="margin: 1.5rem 0; opacity: 0.1;">
                <div id="appointments-list">
                    <p>Loading your schedule...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebaseConfig.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let currentDoctorName = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Get doctor name to filter appointments
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    // Assuming doctor's name is stored in 'name' field
                    // Ideally, appointments would link to doctorId, but for now we used doctor name in booking
                    currentDoctorName = userDoc.data().name;
                    loadAppointments();
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth);
        });

        function loadAppointments() {
            // Note: This relies on exact name match. In production, use doctorId.
            // Adjust query as needed if you stored doctor name in the dropdown differently
            const q = query(collection(db, "appointments"), where("doctor", "==", currentDoctorName));

            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('appointments-list');
                list.innerHTML = '';

                if (snapshot.empty) {
                    list.innerHTML = '<p>No appointments found.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const app = doc.data();
                    list.innerHTML += `
                        <div class="appointment-item">
                            <div class="patient-info">
                                <h4>${app.userName}</h4>
                                <p><i class="fas fa-tag"></i> <strong>Type:</strong> ${app.bookingType}</p>
                                <p><i class="far fa-calendar-check"></i> <strong>Details:</strong> ${app.date} at ${app.time}</p>
                                <p><i class="far fa-envelope"></i> <strong>Email:</strong> ${app.userEmail}</p>
                            </div>
                            <div class="status-box">
                                <span class="status-badge status-${app.status.toLowerCase()}">${app.status}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>

</html>
