<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - DentalCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="index.html" class="logo"><i class="fas fa-tooth"></i> <span>DentalCare<sup>+</sup></span></a>
            <ul class="sidebar-menu">
                <li><a href="dashboard-patient.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="appointment.html"><i class="fas fa-plus-circle"></i> Book Appointment</a></li>
                <li><a href="#" class="active"><i class="fas fa-calendar-alt"></i> My Appointments</a></li>
                <li><a href="#" onclick="window.Auth.logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i>
                        Logout</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="dashboard-header">
                <h2>My Appointments</h2>
            </header>
            <div class="recent-activity">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Doctor</th>
                            <th>Service</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script type="module">
        import { auth, db } from './js/firebaseConfig.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadAppointments(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function loadAppointments(userId) {
            const tbody = document.querySelector('tbody');
            const q = query(collection(db, "appointments"), where("userId", "==", userId));

            onSnapshot(q, (snap) => {
                if (snap.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">No appointments scheduled yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';

                let apps = [];
                snap.forEach(docSnap => apps.push({ id: docSnap.id, ...docSnap.data() }));
                apps.sort((a, b) => new Date(b.date) - new Date(a.date));

                apps.forEach(app => {
                    const statusClass = app.status === 'confirmed' ? 'success' : (app.status === 'pending' ? 'warning' : 'danger');
                    let statusDisplay = app.status.charAt(0).toUpperCase() + app.status.slice(1);

                    let doctorDisplay = app.doctor || 'Unassigned';
                    if (doctorDisplay !== 'Unassigned' && !doctorDisplay.startsWith('Dr.')) doctorDisplay = 'Dr. ' + doctorDisplay;

                    tbody.innerHTML += `
                        <tr>
                            <td><div style="font-weight: 500;">${doctorDisplay}</div></td>
                            <td>${app.bookingType || 'Consultation'}</td>
                            <td>
                                <div>${app.date}</div>
                                <div style="font-size: 0.8rem; color: #666;">${app.time}</div>
                            </td>
                            <td><span class="status-badge status-${statusClass}" style="padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; background: ${statusClass === 'success' ? '#d4edda' : (statusClass === 'warning' ? '#fff3cd' : '#f8d7da')}; color: ${statusClass === 'success' ? '#155724' : (statusClass === 'warning' ? '#856404' : '#721c24')}">${statusDisplay}</span></td>
                        </tr>
                    `;
                });
            });
        }

        document.querySelector('.logout-btn').onclick = () => {
            signOut(auth).then(() => window.location.href = 'login.html');
        };
    </script>
</body>

</html>
